<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="conts.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <video autoplay muted loop playsinline class="vid">
        <source src="2h Blue Soothing Lava Lamp Background | No Sound 4K.mp4" />
      </video>
      <button onclick="location.href='index.html'" class="bbinn">
        <i class="fas fa-chevron-left fa-5x"></i>
      </button>
      <article>
        <form action="https://formspree.io/f/xvoegaag" method="post">
          <div class="about">
            <h1>Contact Me</h1>
            <input
              type="text"
              name="Name"
              placeholder="Name"
              autocomplete="off"
              required
              class="fill"
            />
            <input
              type="email"
              name="email"
              placeholder="Email"
              autocomplete="off"
              required
              class="fill"
            />
            <textarea
              rows="5"
              cols="60"
              name="comment"
              placeholder="Enter your message"
              autocomplete="off"
              required
              class="txtr"
            ></textarea>
            <button type="submit" class="cuki">Submit</button>
          </div>
        </form>
      </article>
    </div>
  </body>
</html>
